<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>{{ if .IsHome }}{{ .Site.Title }} - {{ T "site_tagline" }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="keywords" content="商用车配件,commercial vehicle parts,SHACMAN,CNHTC,WEICHAI,FAW,auto parts export,запчасти для коммерческих автомобилей">
<!-- Hreflang for multilingual SEO -->
{{ if .IsTranslated }}
{{ range .AllTranslations }}
<link rel="alternate" hreflang="{{ .Language.LanguageCode }}" href="{{ .Permalink }}" />
{{ end }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.Home.Permalink }}" />
{{ end }}
<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}" />
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- Preconnect & preload for faster first paint -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="//tile.openstreetmap.org">
<link rel="dns-prefetch" href="//basemaps.cartocdn.com">
<!-- Preload hero background image so it appears as soon as possible -->
<link rel="preload" as="image" href="{{ "images/hero-truck.webp" | relURL }}">
<!-- Google Fonts — non-blocking (fallback inside <noscript>) -->
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@500&display=swap">
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@500&display=swap">
</noscript>
<!-- Main Stylesheet -->
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
<link rel="icon" type="image/png" href="{{ "images/logo.png" | relURL }}">
<!-- Fallback: ensure content is visible if JavaScript is disabled -->
<noscript>
<style>.reveal,.reveal-left,.reveal-right,.reveal-scale,.stagger-children>*{opacity:1!important;transform:none!important}</style>
</noscript>
<!-- Critical: redirect root path to best language BEFORE page renders -->
<script>
(function(){if(window.location.pathname!=='/')return;var r=sessionStorage.getItem('yhyr');if(r==='1')return;var s=['zh','en','ru'],l=localStorage.getItem('yhy_lang');function g(t){if(s.indexOf(t)===-1)t='en';sessionStorage.setItem('yhyr','1');localStorage.setItem('yhy_lang',t);window.location.replace('/'+t+'/')}if(l&&s.indexOf(l)!==-1){g(l);return}var n=navigator.language||navigator.userLanguage||'',t='en';if(n.indexOf('zh')===0)t='zh';else if(n.indexOf('ru')===0)t='ru';g(t)})();
</script>
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ "images/og-banner.webp" | absURL }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{ .Site.Title }} - {{ T "site_tagline" }}">
<meta name="twitter:card" content="summary_large_image">
<!-- Schema.org Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "logo": "{{ "images/logo.png" | absURL }}",
  "description": "{{ .Site.Params.description }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "{{ .Site.Params.company_phone }}",
    "contactType": "sales",
    "availableLanguage": ["Chinese", "English", "Russian"],
    "areaServed": ["CN", "RU", "ZM", "ZA", "NG", "TZ", "KE", "GH", "PH", "VN", "MX"]
  },
  "sameAs": [
    "https://wa.me/{{ .Site.Params.whatsapp_number }}"
  ]
}
</script>
{{ if .IsHome }}
<!-- Schema.org WebSite -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{ .Site.BaseURL }}?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ end }}
