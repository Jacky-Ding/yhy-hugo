<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>{{ if .IsHome }}{{ .Site.Title }} - {{ T "site_tagline" }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="keywords" content="商用车配件,commercial vehicle parts,SHACMAN,CNHTC,WEICHAI,FAW,auto parts export,запчасти для коммерческих автомобилей">
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="{{ "images/logo.svg" | relURL }}">
<!-- Critical: redirect root path to best language BEFORE page renders -->
<script>
(function(){if(window.location.pathname!=='/')return;var r=sessionStorage.getItem('yhyr');if(r==='1')return;var s=['zh','en','ru'],l=localStorage.getItem('yhy_lang');function g(t){if(s.indexOf(t)===-1)t='en';sessionStorage.setItem('yhyr','1');localStorage.setItem('yhy_lang',t);window.location.replace('/'+t+'/')}if(l&&s.indexOf(l)!==-1){g(l);return}fetch('https://api.ipregistry.co/?key=tryout').then(function(r){return r.json()}).then(function(d){var c=(d.location&&d.location.country&&d.location.country.code)||'',t='en';if(['CN','HK','TW','MO','SG'].indexOf(c)!==-1)t='zh';else if(['RU','BY','KZ','KG','UZ','TJ','AM','AZ','MD'].indexOf(c)!==-1)t='ru';g(t)}).catch(function(){var n=navigator.language||navigator.userLanguage||'',t='en';if(n.indexOf('zh')===0)t='zh';else if(n.indexOf('ru')===0)t='ru';g(t)})})();
</script>
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
