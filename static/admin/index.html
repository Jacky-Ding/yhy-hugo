<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script>
    window.addEventListener('message', function(event) {
      console.log('Admin received message:', event.data);
      if (event.data && event.data.token) {
        // 确保 key 拼写正确：netlify 不是 netlifc
        localStorage.setItem('netlify-cms-oauth-token', event.data.token);
        localStorage.setItem('decap-cms-oauth-token', event.data.token);
        console.log('Token saved. Reloading...');
        window.location.reload();
      }
    });
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
