backend:
  name: github
  repo: Jacky-Ding/yhy-hugo   # 例如 octocat/yhy-hugo
  branch: main                         # 你的默认分支，可能是 master
  base_url: https://yhy-hugo.pages.dev # 你的 Cloudflare Pages 测试域名
  auth_endpoint: /api/auth

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "页面管理"
    files:
      - file: "content/_index.zh.md"
        label: "中文首页"
        fields:
          - {label: "标题", name: "title", widget: "string"}
          - {label: "Banner标题", name: "banner_title", widget: "string"}
          # 可根据你实际内容添加更多字段
      - file: "content/about/index.zh.md"
        label: "关于我们 (中文)"
        fields:
          - {label: "标题", name: "title", widget: "string"}
          - {label: "正文", name: "body", widget: "markdown"}
