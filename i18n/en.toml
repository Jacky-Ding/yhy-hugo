branch_africa_title = "Zambia: Oceanlight Investment Company Limited — Ndola Base"

branch_africa_desc = "The company's first overseas direct-operated service base, located in Ndola, Zambia. Integrating maintenance and repair, genuine OEM parts supply, 24-hour accident rescue, and technical support — a frontier stronghold for deep engagement in the African market."

branch_lusaka_title = "Terra Light Investment Company Limited — Lusaka Service Center"

branch_lusaka_desc = "Located in Zambia's capital Lusaka, this is the officially authorized parts distribution center and designated maintenance service station for SHACMAN heavy-duty trucks, providing specialized, localized repair, parts supply, and technical support services covering Lusaka and surrounding areas."

global_coverage = "Market Coverage & Regional Advantages"

global_coverage_desc = "Our business network now spans multiple core economic regions, with long-term, stable partnerships established with over 500 clients."

region_africa_title = "Africa Region"

region_africa_desc = "Representative countries: Zambia, Tanzania, Nigeria, Cameroon, Mozambique, and more. Leveraging the dual service centers in Ndola and Lusaka, we achieve in-stock parts supply and rapid distribution, provide professional technical consultation, fault diagnosis, and on-site support, realizing comprehensive coverage from cross-border trade to localized service."

region_europe_asia_title = "Europe & Asia Region"

region_europe_asia_desc = "Representative countries: Russian Federation, Kazakhstan, and more. Catering to specific vehicle models and operating conditions in the Eurasian market, we provide WEICHAI, SHACMAN, CNHTC, and other leading brand engine core parts and comprehensive components, meeting clients' durability and bulk procurement needs."

region_southeast_asia_south_america_title = "Southeast Asia & South America Regions"

region_southeast_asia_south_america_desc = "Representative countries: Indonesia, Philippines, and more. Aligned with the rapidly growing commercial vehicle market demand in these regions, we offer diverse OEM parts, proprietary-brand OEM filters, and customized product solutions, achieving the perfect balance of high cost-effectiveness and rapid response."

global_synergy_title = "Core Advantages of Global Synergy"

global_synergy_desc = "Through efficient integration of internal resources, we have forged a global competitive edge that is difficult to replicate."

synergy1_title = "Dual-City Warehousing, Efficient Fulfillment"

synergy1_desc = "50,000m² professional warehousing facilities in Linyi and 50,000m² in Jinan operating in synergy, with inventory exceeding 100,000 SKUs — flexibly responding to global clients' spot, rush, and large-volume customized demands."

synergy2_title = "Complete Credentials, Compliance Guarantee"

synergy2_desc = "Holding core authorizations from SHACMAN, CNHTC, WEICHAI, and other brands, along with proprietary trademarks 'Jingchu' and 'Huanyue' — the entire procurement chain is traceable with clear IP rights, mitigating cross-border trade compliance risks from the source."

synergy3_title = "Localized Service, Rapid Response"

synergy3_desc = "Relying on Oceanlight Investment Company Limited and Terra Light Investment Company Limited in Zambia, we have realized localized overseas maintenance, accident rescue, and parts supply, providing 7×24 all-weather service to the African and surrounding markets with extremely rapid after-sales response — truly achieving service forward-deployment and value extension."

synergy4_title = "One-Stop Logistics, Chain to the World"

synergy4_desc = "The trinity of the parent company, Huanuo, and Hongyuan Freight Forwarding forms an internal closed loop from product sales and brand operations to international freight forwarding, significantly enhancing customs clearance efficiency while reducing logistics costs and risks."

