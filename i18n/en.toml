global_subtitle = "Rooted in Linyi, Connected with Jinan, Deeply Engaged in Africa — Building a Global Commercial Vehicle Parts Service Network"

global_overview = "Shandong Yuhongyuan International Trade Co., Ltd., rooted in Linyi — the 'Logistics Capital of China' — leverages domestic strategic subsidiaries and overseas direct-operated bases to build a global operational framework of 'efficient domestic synergy with forward-deployed overseas services.' With Linyi as our supply chain and logistics center, Jinan as our product and brand center, Linyi Hongyuan as our specialized freight forwarding hub, and through Oceanlight Investment Company Limited and Terra Light Investment Company Limited in Zambia, we extend services to the African frontline, providing global clients with seamless, efficient, one-stop commercial vehicle parts supply and repair service solutions."

