contact_faq = "Frequently Asked Questions"

faq1_title = "What is the minimum order quantity?"

faq1_answer = "The minimum order quantity for standard products is one piece, with more favorable pricing available for bulk purchases. MOQ for customized products depends on the product type — please consult our sales team for details."

faq2_title = "What is the delivery lead time?"

faq2_answer = "In-stock products are typically dispatched within 1–3 business days after payment. Customized products have a lead time of 7–30 days, depending on product complexity and order quantity. International shipping takes 7–45 days depending on the destination."

faq3_title = "Is product quality guaranteed?"

faq3_answer = "All our products are genuine OEM parts with brand authorization certificates. Every batch undergoes rigorous quality inspection before dispatch. Core products come with a 6–12 month warranty — free replacement or repair for non-human-damaged items."

faq4_title = "What payment methods are supported?"

faq4_answer = "We support T/T (wire transfer), L/C (letter of credit), Western Union, PayPal, Alipay, WeChat Pay, and other payment methods. Flexible payment terms such as monthly settlement can be arranged for long-term cooperative clients."

