subsidiary_huanuo_desc = "The company's core product and brand center. Powered by a dual-wheel system of 'OEM-authorized core parts + proprietary brands (Jingchu, Huanyue) differentiated products,' equipped with 50,000m² professional warehousing, supplying full-category, high-quality commercial vehicle parts to global clients."

subsidiary_hongyuan_title = "Linyi Hongyuan International Freight Forwarding Co., Ltd. (Linyi)"

subsidiary_hongyuan_desc = "The company's one-stop cross-border logistics hub. Leveraging Linyi's locational advantages, we provide integrated logistics services including international freight forwarding, customs declaration and clearance, and multimodal transport, ensuring efficient flow and delivery security for cross-border trade."

