contact_faq = "Часто задаваемые вопросы"

faq1_title = "Каков минимальный объем заказа?"

faq1_answer = "Минимальный объем заказа для стандартной продукции составляет одну штуку, при оптовых закупках доступны более выгодные цены. MOQ для индивидуальной продукции зависит от типа продукта — пожалуйста, проконсультируйтесь с нашей командой продаж для получения подробной информации."

faq2_title = "Каков срок поставки?"

faq2_answer = "Товары в наличии обычно отправляются в течение 1–3 рабочих дней после оплаты. Срок поставки индивидуальной продукции составляет 7–30 дней, в зависимости от сложности продукта и количества заказа. Срок международной доставки составляет от 7 до 45 дней в зависимости от пункта назначения."

faq3_title = "Гарантируется ли качество продукции?"

faq3_answer = "Вся наша продукция является оригинальными запчастями с сертификатами авторизации бренда. Каждая партия проходит строгий контроль качества перед отправкой. Основные продукты имеют гарантийный период 6–12 месяцев — бесплатная замена или ремонт при повреждении не по вине человека."

faq4_title = "Какие способы оплаты поддерживаются?"

faq4_answer = "Мы поддерживаем T/T (банковский перевод), L/C (аккредитив), Western Union, PayPal, Alipay, WeChat Pay и другие способы оплаты. Для постоянных клиентов могут быть организованы гибкие условия оплаты, такие как ежемесячный расчет."

