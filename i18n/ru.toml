other = "Shandong Yuhongyuan International Trade Co., Ltd., укоренившаяся в Лини — «Логистической столице Китая» — использует отечественные стратегические дочерние компании и зарубежные базы прямого управления для построения глобальной операционной структуры «эффективная внутренняя синергия с передовыми зарубежными услугами». Мы используем Лини как центр цепочки поставок и логистики, Цзинань как центр продукции и бренда, Linyi Hongyuan как профессиональный хаб грузовых перевозок, и через Oceanlight Investment Company Limited и Terra Light Investment Company Limited в Замбии переносим услуги на передовую в Африке, предоставляя глобальным клиентам бесшовные, эффективные решения по поставке запчастей для коммерческих автомобилей и услугам по ремонту."

[global_structure]
other = "Организационная структура"

[global_domestic_title]
other = "Отечественные субъекты"

[global_domestic_desc]
other = "Триединая структура, эффективная синергия, формирующая мощную систему поддержки бизнеса Группы внутри страны."

[subsidiary_yhy_title]
other = "Shandong Yuhongyuan International Trade Co., Ltd. (Лини)"

[subsidiary_yhy_desc]
other = "Операционный и логистический центр компании, ответственный за интеграцию глобальных ресурсов продукции, централизованные закупки, управление современным складом площадью 50 000 м² и обработку трансграничных заказов — основная движущая сила глобального бизнеса."

[subsidiary_huanuo_title]
other = "Shandong Huanuo Automobile Sales & Service Co., Ltd. (Цзинань)"

[subsidiary_huanuo_desc]
other = "Основной центр продукции и бренда компании. На основе системы двойного движения «основные части с авторизацией OEM + дифференцированные продукты собственных брендов (Jingchu, Huanyue)», оснащенный профессиональным складом площадью 50 000 м², поставляет запчасти для коммерческих автомобилей полной номенклатуры и высокого качества глобальным клиентам."

[subsidiary_hongyuan_title]
other = "Linyi Hongyuan International Freight Forwarding Co., Ltd. (Лини)"

[subsidiary_hongyuan_desc]
other = "Единый трансграничный логистический хаб компании. Опираясь на преимущества местоположения Лини, мы профессионально предоставляем комплексные логистические услуги, включая международные грузоперевозки, таможенное оформление и мультимодальные перевозки, обеспечивая эффективный поток и безопасность доставки трансграничной торговли."

[global_overseas_title]
other = "Зарубежное присутствие"

[global_overseas_desc]
