[branch_africa_title]
other = "Замбия: Oceanlight Investment Company Limited — база в Ндоле"

[branch_africa_desc]
other = "Первая зарубежная база прямого управления компании, расположенная в Ндоле, Замбия. Объединяет техническое обслуживание и ремонт, поставку оригинальных запчастей, 24-часовую аварийную спасательную службу и техническую поддержку — передовой плацдарм для глубокого освоения рынка Африки."

[branch_lusaka_title]
other = "Terra Light Investment Company Limited — сервисный центр в Лусаке"

[branch_lusaka_desc]
other = "Расположен в столице Замбии Лусаке, это официально уполномоченный центр дистрибуции запчастей и назначенная станция технического обслуживания для тяжелых грузовиков SHACMAN, предоставляющий специализированные, локализованные услуги по ремонту и техническому обслуживанию, поставке запчастей и технической поддержке, охватывающие Лусаку и окрестности."

[global_coverage]
other = "Охват рынка и региональные преимущества"

[global_coverage_desc]
other = "Наша деловая сеть уже охватывает несколько ключевых экономических регионов, с долгосрочными и стабильными партнерскими отношениями, установленными с более чем 500 клиентами."

[region_africa_title]
other = "Африканский регион"

[region_africa_desc]
other = "Представительные страны: Замбия, Танзания, Нигерия, Камерун, Мозамбик и др. Опираясь на двойные сервисные центры в Ндоле и Лусаке, Замбия, мы достигаем поставки запчастей со склада и быстрой доставки, предоставляем профессиональные технические консультации, диагностику неисправностей и поддержку на месте, реализуя всестороннее покрытие от трансграничной торговли до локализованных услуг."

[region_europe_asia_title]
other = "Европейско-Азиатский регион"

[region_europe_asia_desc]
other = "Представительные страны: Российская Федерация, Казахстан и др. Учитывая специфические модели автомобилей и условия эксплуатации на Евразийском рынке, мы предоставляем основные детали двигателей и компоненты полной системы ведущих брендов, таких как WEICHAI, SHACMAN, CNHTC и др., удовлетворяя потребности клиентов в погодоустойчивости и массовых закупках."

[region_southeast_asia_south_america_title]
other = "Регионы Юго-Восточной Азии и Южной Америки"

[region_southeast_asia_south_america_desc]
other = "Представительные страны: Индонезия, Филиппины и др. В сочетании с быстро растущим спросом на рынке коммерческих автомобилей в регионе мы предоставляем разнообразные оригинальные запчасти, OEM-фильтры собственных брендов и индивидуальные продуктовые решения, достигая идеального баланса высокой экономической эффективности и быстрого реагирования."

[global_synergy_title]
other = "Ключевые преимущества глобальной синергии"

[global_synergy_desc]
other = "Посредством эффективной интеграции внутренних ресурсов мы сформировали глобальную конкурентоспособность, которую трудно воспроизвести."

[synergy1_title]
other = "Склады в двух городах, эффективное выполнение заказов"

[synergy1_desc]
other = "Профессиональные складские мощности площадью 50 000 м² в Лини и 50 000 м² в Цзинане работают в синергии, запасы SKU превышают 100 000 наименований, могут гибко реагировать на спотовые, срочные и крупные индивидуальные заказы глобальных клиентов."

[synergy2_title]
other = "Полный пакет лицензий, гарантия соответствия"

[synergy2_desc]
other = "Наличие основной авторизации от SHACMAN, CNHTC, WEICHAI и других брендов, а также собственных товарных знаков «Jingchu» и «Huanyue» — вся цепочка закупок прослеживаема, права интеллектуальной собственности четкие, устранение рисков соответствия трансграничной торговли из источника."

[synergy3_title]
other = "Локализованный сервис, быстрый отклик"

[synergy3_desc]
other = "Опираясь на Oceanlight Investment Company Limited и Terra Light Investment Company Limited в Замбии, мы реализовали локализацию зарубежного технического обслуживания и ремонта, аварийного спасения, поставок запчастей, можем предоставлять круглосуточное обслуживание 7×24 для африканского и окружающего рынков, с экстремально быстрым реагированием на послепродажные потребности, действительно достигая переноса услуг вперед и расширения ценности."

[synergy4_title]
